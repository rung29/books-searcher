<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Searcher</title>
    <style>
      :root {
        --bg: #eef4f1;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #64748b;
        --line: #d8e0dd;
        --accent: #0f766e;
        --accent-dark: #115e59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(15, 118, 110, 0.14), transparent 30%),
          linear-gradient(135deg, #eef4f1 0%, #f8fafc 100%);
        color: var(--text);
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        line-height: 1.6;
        padding: 24px;
      }

      main {
        width: min(100%, 720px);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 22px 60px rgba(28, 46, 43, 0.12);
        padding: 32px;
      }

      p {
        color: var(--muted);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.4rem);
        line-height: 1.05;
      }

      .eyebrow {
        color: var(--accent-dark);
        font-weight: 800;
        margin: 0 0 8px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a {
        min-height: 46px;
        display: inline-grid;
        place-items: center;
        border-radius: 8px;
        padding: 0 16px;
        font-weight: 800;
        text-decoration: none;
      }

      .primary {
        background: var(--accent);
        color: #ffffff;
      }

      .secondary {
        border: 1px solid var(--line);
        color: var(--accent-dark);
      }

      .note {
        margin-top: 22px;
        border-top: 1px solid var(--line);
        padding-top: 18px;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">GitHub Pages</p>
      <h1>Book Searcher</h1>
      <p>
        這是 GitHub Pages 的靜態入口頁。GitHub Pages 可以顯示 HTML，
        但不能直接執行 Flask/Python 後端，所以即時查詢功能仍需要後端服務。
      </p>
      <div class="actions">
        <a class="primary" href="https://github.com/rung29/books-searcher/actions/workflows/library-connectivity.yml">
          執行館藏連線測試
        </a>
        <a class="secondary" href="https://github.com/rung29/books-searcher/tree/web-version">
          查看網頁版分支
        </a>
      </div>
      <p class="note">
        如果 GitHub Actions 的館藏連線測試成功，下一步可以改成由 Actions 產生靜態查詢結果檔，
        再交給 GitHub Pages 顯示。
      </p>
    </main>
  </body>
</html>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>書籍搜尋</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="heading">
          <p class="eyebrow">彰化閱讀線上查詢</p>
          <h1>書籍搜尋</h1>
          <p>輸入條件後取得驗證碼，再送出查詢。手機瀏覽器也能直接使用。</p>
        </div>

        {% if active_search %}
          <div class="resume-box">
            <strong>已有一筆查詢結果</strong>
            <p>{{ active_search.readrang }} / {{ active_search.testing }}{% if active_search.keywords %} / {{ active_search.keywords }}{% endif %}</p>
            <div class="split-actions">
              <a class="button-link" href="{{ url_for('results', token=search_token, page=active_search.initial_page or 1) }}">回到結果</a>
              <form method="post" action="{{ url_for('reset') }}" data-reset-search>
                <button class="secondary-button" type="submit">重新查詢</button>
              </form>
            </div>
          </div>
        {% endif %}

        <form class="form" method="post" action="{{ url_for('captcha') }}" data-progress-message="正在取得驗證碼...">
          <label>
            適讀年段
            <select name="readrang">
              {% for value, label in readrang_options %}
                <option value="{{ value }}" {% if form.readrang == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </label>

          <label>
            認證狀態
            <select name="testing">
              {% for value, label in testing_options %}
                <option value="{{ value }}" {% if form.testing == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </label>

          <label>
            關鍵字
            <input name="keywords" value="{{ form.keywords }}" placeholder="可留空">
          </label>

          <label>
            查詢頁數
            <input name="initial_page" type="number" min="1" step="1" value="{{ form.initial_page }}">
          </label>

          <label class="check-row">
            <input type="checkbox" name="include_library" value="1">
            同時查詢伸港圖書館館藏
          </label>

          <button type="submit">取得驗證碼</button>
        </form>
      </section>
    </main>
    <div class="loading-overlay" data-loading-overlay hidden>
      <div class="loading-panel">
        <div class="spinner" aria-hidden="true"></div>
        <p data-loading-message>處理中...</p>
      </div>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
